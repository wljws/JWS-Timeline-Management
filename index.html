                }
            }, [timelineStart, today, zoomLevel, viewMode]);

            const togglePhaseSelection = (phaseId) => {
                setSelectedPhaseIds(prev => {
                    const next = new Set(prev);
                    if (next.has(phaseId)) next.delete(phaseId);
                    else next.add(phaseId);
                    return next;
                });
            };

            const toggleProjectSelection = (projectId) => {
                const project = projects.find(p => p.id === projectId);
                if (!project) return;
                const allPhaseIds = project.phases.map(ph => ph.id);
                const allSelected = allPhaseIds.every(id => selectedPhaseIds.has(id));
                setSelectedPhaseIds(prev => {
                    const next = new Set(prev);
                    if (allSelected) {
                        allPhaseIds.forEach(id => next.delete(id));
                    } else {
                        allPhaseIds.forEach(id => next.add(id));
                    }
                    return next;
                });
            };

            const toggleLock = (projectId, phaseId) => {
                updateProjects(projects.map(p => p.id === projectId ? {
                    ...p, phases: p.phases.map(ph => ph.id === phaseId ? { ...ph, isLocked: !ph.isLocked } : ph)
                } : p));
                if (modalData && modalData.phase.id === phaseId) {
                    setModalData(prev => ({ ...prev, phase: { ...prev.phase, isLocked: !prev.phase.isLocked } }));
                }
            };

            const toggleProjectExpand = (id) => updateProjects(projects.map(p => p.id === id ? { ...p, isExpanded: !p.isExpanded } : p));
            const updateProjectTitle = (id, newTitle) => updateProjects(projects.map(p => p.id === id ? { ...p, title: newTitle } : p));
            const updateProjectColor = (id, newColor) => updateProjects(projects.map(p => p.id === id ? { ...p, color: newColor } : p));

            const addProject = () => {
                updateProjects([...projects, {
                    id: generateId(),
                    title: 'New Project',
                    color: THEME_COLORS[Math.floor(Math.random() * THEME_COLORS.length)],
                    isExpanded: true,
                    phases: STANDARD_TEMPLATE_PHASES.map(t => ({
                        id: generateId(),
                        title: t.title,
                        isLocked: false,
                        start: null,
                        end: null,
                        tasks: t.tasks.map(taskTemplate => ({ id: generateId(), text: taskTemplate.text, done: false, assignee: '', start: null, end: null, allocations: [] })),
                        milestones: []
                    }))
                }]);
            };

            const addPhase = (projectId) => {
                 updateProjects(projects.map(p => {
                    if (p.id === projectId) {
                        return {
                            ...p,
                            isExpanded: true,
                            phases: [...p.phases, {
                                id: generateId(),
                                title: 'New Phase',
                                isLocked: false,
                                start: null,
                                end: null,
                                tasks: [],
                                milestones: []
                            }]
                        }
                    }
                    return p;
                 }));
            };

            const deleteProject = (projectId) => {
                updateProjects(projects.filter(p => p.id !== projectId));
                if (modalData && modalData.projectId === projectId) setModalData(null);
            };

            const handleGridClick = (e, projectId, phaseId) => {
                if (e.target !== e.currentTarget || viewMode !== 'projects') return;
                const clickX = e.nativeEvent.offsetX;
                const daysFromStart = Math.floor(clickX / zoomLevel);
                const weekIndex = Math.floor(daysFromStart / 7);
                const newStart = addDays(timelineStart, weekIndex * 7);
                const newEnd = addDays(newStart, 6);

                updateProjects(projects.map(p => {
                    if (p.id === projectId) {
                        return {
                            ...p,
                            phases: p.phases.map(ph => {
                                if (ph.id === phaseId && !ph.isLocked) return { ...ph, start: newStart, end: newEnd };
                                return ph;
                            })
                        }
                    }
                    return p;
                }));
            };

            // --- Drag and Drop Logic (Rows & Phases - Projects View) ---
            const onDragStartRow = (e, index) => {
                dragStartProjects.current = projects;
                setDraggedProjectIndex(index);
                e.dataTransfer.effectAllowed = "move";
            };
            const onDragOverRow = (e, index) => {
                e.preventDefault();
                if (draggedProjectIndex === null || draggedProjectIndex === index) return;
                const newProjects = [...projects];
                const draggedItem = newProjects[draggedProjectIndex];
                newProjects.splice(draggedProjectIndex, 1);
                newProjects.splice(index, 0, draggedItem);
                setDraggedProjectIndex(index);
                setProjects(newProjects);
            };
            const onDragEndRow = () => {
                setDraggedProjectIndex(null);
                setProjects(current => {
                    if (dragStartProjects.current && dragStartProjects.current !== current) {
                        setPast(p => [...p, dragStartProjects.current]);
                        setFuture([]);
                    }
                    return current;
                });
            };

            const onDragStartPhase = (e, projectId, phaseIndex) => {
                e.stopPropagation();
                dragStartProjects.current = projects;
                setDraggedPhase({ projectId, phaseIndex });
                e.dataTransfer.effectAllowed = "move";
            };
            const onDragOverPhase = (e, projectId, targetIndex) => {
                e.preventDefault();
                e.stopPropagation();
                if (!draggedPhase || draggedPhase.projectId !== projectId || draggedPhase.phaseIndex === targetIndex) return;

                setProjects(prev => prev.map(p => {
                    if (p.id === projectId) {
                        const newPhases = [...p.phases];
                        const draggedItem = newPhases[draggedPhase.phaseIndex];
                        newPhases.splice(draggedPhase.phaseIndex, 1);
                        newPhases.splice(targetIndex, 0, draggedItem);
                        return { ...p, phases: newPhases };
                    }
                    return p;
                }));
                setDraggedPhase({ projectId, phaseIndex: targetIndex });
            };
            const onDragEndPhase = (e) => {
                e.stopPropagation();
                setDraggedPhase(null);
                setProjects(current => {
                    if (dragStartProjects.current && dragStartProjects.current !== current) {
                        setPast(p => [...p, dragStartProjects.current]);
                        setFuture([]);
                    }
                    return current;
                });
            };

            // --- Drag and Drop Logic (Team View: Team Member Row Rearrangement) ---
            const onDragStartTeamMember = (e, memberName) => {
                e.stopPropagation();
                if (memberName === 'Unassigned') {
                    e.preventDefault();
                    return;
                }
                setDraggedTeamMemberName(memberName);
                e.dataTransfer.effectAllowed = "move";
            };

            const onDragOverTeamMember = (e, targetMemberName) => {
                e.preventDefault();
                e.stopPropagation();
                if (!draggedTeamMemberName || draggedTeamMemberName === targetMemberName || targetMemberName === 'Unassigned') return;

                setTeamMembers(prev => {
                    const newMembers = [...prev];
                    const draggedIdx = newMembers.indexOf(draggedTeamMemberName);
                    const targetIdx = newMembers.indexOf(targetMemberName);
                    
                    if (draggedIdx === -1 || targetIdx === -1) return prev;

                    const [draggedItem] = newMembers.splice(draggedIdx, 1);
                    newMembers.splice(targetIdx, 0, draggedItem);
                    return newMembers;
                });
            };

            const onDragEndTeamMember = (e) => {
                e.stopPropagation();
                setDraggedTeamMemberName(null);
            };

            // --- Drag and Drop Logic (Team View: Allocations between Grids / Pools) ---
            const onDragStartTeamItem = (e, projectId, phaseId, task, allocationId, origStart, origEnd) => {
                e.stopPropagation();
                dragStartProjects.current = projects;
                setDraggedTeamItem({ projectId, phaseId, taskId: task.id, allocationId, origStart, origEnd });
                e.dataTransfer.effectAllowed = "move";
            };

            const onDropTeamGrid = (e, targetAssignee, colIndex) => {
                e.preventDefault();
                e.stopPropagation();
                if (!draggedTeamItem) return;

                const dayOffset = Math.floor(colIndex / 2);
                const isPM = colIndex % 2 !== 0;
                
                let newStart = addDays(currentTeamWeekStart, dayOffset);
                newStart.setHours(isPM ? 12 : 0, 0, 0, 0);
                
                let newEnd;
                if (draggedTeamItem.origStart && draggedTeamItem.origEnd) {
                     const duration = draggedTeamItem.origEnd.getTime() - draggedTeamItem.origStart.getTime();
                     newEnd = new Date(newStart.getTime() + duration);
                } else {
                     newEnd = new Date(newStart);
                     newEnd.setHours(isPM ? 23 : 11, 59, 59, 999);
                }

                const finalAssignee = targetAssignee === 'Unassigned' ? '' : targetAssignee;

                // PREVENT OVERLAP
                if (finalAssignee) {
                    if (checkTeamOverlap(projects, finalAssignee, newStart, newEnd, draggedTeamItem.allocationId)) {
                        alert(`Cannot assign task here. ${finalAssignee} already has a task in this time slot.`);
                        setDraggedTeamItem(null);
                        return;
                    }
                }

                setProjects(prev => prev.map(p => p.id === draggedTeamItem.projectId ? {
                    ...p, phases: p.phases.map(ph => ph.id === draggedTeamItem.phaseId ? {
                        ...ph, tasks: ph.tasks.map(t => {
                            if (t.id === draggedTeamItem.taskId) {
                                let newAllocations = [...(t.allocations || [])];
                                if (draggedTeamItem.allocationId) {
                                    newAllocations = newAllocations.map(a => a.id === draggedTeamItem.allocationId ? { ...a, start: newStart, end: newEnd } : a);
                                } else {
                                    newAllocations.push({ id: generateId(), start: newStart, end: newEnd, subTasks: [] });
                                }
                                const updatedTask = { ...t, assignee: finalAssignee, allocations: newAllocations };
                                return syncTaskDates(updatedTask);
                            }
                            return t;
                        })
                    } : ph)
                } : p));

                setDraggedTeamItem(null);
                setProjects(current => {
                    if (dragStartProjects.current && dragStartProjects.current !== current) {
                        setPast(p => [...p, dragStartProjects.current]);
                        setFuture([]);
                    }
                    return current;
                });
            };

            const onDropTeamPool = (e, targetAssignee) => {
                e.preventDefault();
                e.stopPropagation();
                if (!draggedTeamItem) return;

                const finalAssignee = targetAssignee === 'Unassigned' ? '' : targetAssignee;

                setProjects(prev => prev.map(p => p.id === draggedTeamItem.projectId ? {
                    ...p, phases: p.phases.map(ph => ph.id === draggedTeamItem.phaseId ? {
                        ...ph, tasks: ph.tasks.map(t => {
                            if (t.id === draggedTeamItem.taskId && draggedTeamItem.allocationId) {
                                const newAllocations = (t.allocations || []).filter(a => a.id !== draggedTeamItem.allocationId);
                                return syncTaskDates({ ...t, assignee: finalAssignee, allocations: newAllocations });
                            }
                            if (t.id === draggedTeamItem.taskId) {
                                return { ...t, assignee: finalAssignee };
                            }
                            return t;
                        })
                    } : ph)
                } : p));

                setDraggedTeamItem(null);
                setProjects(current => {
                    if (dragStartProjects.current && dragStartProjects.current !== current) {
                        setPast(p => [...p, dragStartProjects.current]);
                        setFuture([]);
                    }
                    return current;
                });
            };

            // Block & Column Resizing/Dragging Logic
            const [draggingBlock, setDraggingBlock] = useState(null);
            const [isResizingCol, setIsResizingCol] = useState(false);
            const lastInteractionRef = useRef({ isDragging: false, startX: 0, startY: 0 });

            useEffect(() => {
                const handleMouseMove = (e) => {
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    
                    if (isResizingCol) {
                        setLeftColWidth(Math.max(120, Math.min(800, clientX)));
                        return;
                    }
                    if (!draggingBlock) return;
                    
                    // Smart Intent Detection: Differentiate between "I want to scroll" and "I want to drag a block"
                    if (!lastInteractionRef.current.isDragging) {
                        const deltaX = clientX - draggingBlock.startX;
                        const deltaY = clientY - draggingBlock.startY;
                        
                        // If moving mostly vertically, cancel block drag to allow native page scroll
                        if (Math.abs(deltaY) > Math.abs(deltaX) && Math.abs(deltaY) > 5) {
                            setDraggingBlock(null);
                            return;
                        }
                        
                        // If moving mostly horizontally, lock into custom drag mode
                        if (Math.abs(deltaX) > 5) {
                            lastInteractionRef.current.isDragging = true;
                        } else {
                            return; // Wait for further movement
                        }
                    }

                    // Prevent native scroll/refresh events only when actively dragging left/right
                    if (lastInteractionRef.current.isDragging && e.cancelable) {
                        e.preventDefault();
                    }

                    const deltaX = clientX - draggingBlock.startX;
                    const ppd = draggingBlock.pixelsPerDay || zoomLevel;
                    const deltaDays = Math.round((deltaX / ppd) * 2) / 2;
                    
                    if (deltaDays !== 0) {
                        setProjects(prev => {
                            let next = [...prev];
                            let changed = false;

                            draggingBlock.blocksToMove.forEach(b => {
                                const pIndex = next.findIndex(p => p.id === b.projectId);
                                if (pIndex > -1) {
                                    const phIndex = next[pIndex].phases.findIndex(ph => ph.id === b.phaseId);
                                    if (phIndex > -1) {
                                        
                                        // RESIZING/MOVING A TEAM ALLOCATION
                                        if (b.allocationId) {
                                            const tIndex = next[pIndex].phases[phIndex].tasks.findIndex(t => t.id === b.taskId);
                                            if (tIndex > -1) {
                                                const task = next[pIndex].phases[phIndex].tasks[tIndex];
                                                const aIndex = (task.allocations || []).findIndex(a => a.id === b.allocationId);
                                                if (aIndex > -1) {
                                                    const alloc = task.allocations[aIndex];
                                                    let newStart = alloc.start;
                                                    let newEnd = alloc.end;
                                                    
                                                    if (draggingBlock.type === 'move-alloc') {
                                                        newStart = addDays(b.origStart, deltaDays);
                                                        newEnd = addDays(b.origEnd, deltaDays);
                                                    } else if (draggingBlock.type === 'resize-alloc-left') {
                                                        newStart = addDays(b.origStart, deltaDays);
                                                        if (newStart > newEnd) newStart = newEnd;
                                                    } else if (draggingBlock.type === 'resize-alloc-right') {
                                                        newEnd = addDays(b.origEnd, deltaDays);
                                                        if (newEnd < newStart) newEnd = newStart;
                                                    }
                                                    
                                                    // PREVENT OVERLAP DURING DRAG
                                                    const finalAssignee = task.assignee;
                                                    let isColliding = false;
                                                    if (finalAssignee) {
                                                        isColliding = checkTeamOverlap(next, finalAssignee, newStart, newEnd, b.allocationId);
                                                    }
                                                    
                                                    if (!isColliding && (newStart.getTime() !== alloc.start.getTime() || newEnd.getTime() !== alloc.end.getTime())) {
                                                        const newAllocations = [...task.allocations];
                                                        newAllocations[aIndex] = { ...alloc, start: newStart, end: newEnd };
                                                        
                                                        const newTasks = [...next[pIndex].phases[phIndex].tasks];
                                                        newTasks[tIndex] = syncTaskDates({ ...task, allocations: newAllocations });
                                                        
                                                        const newPhases = [...next[pIndex].phases];
                                                        newPhases[phIndex] = { ...newPhases[phIndex], tasks: newTasks };
                                                        
                                                        next[pIndex] = { ...next[pIndex], phases: newPhases };
                                                        changed = true;
                                                    }
                                                }
                                            }
                                        } 
                                        // RESIZING/MOVING A WHOLE PHASE (Project View)
                                        else {
                                            const ph = next[pIndex].phases[phIndex];
                                            let newStart = ph.start;
                                            let newEnd = ph.end;
                                            let newTasks = ph.tasks; 
                                            let anyCollision = false;

                                            if (draggingBlock.type === 'move') {
                                                newStart = addDays(b.origStart, deltaDays);
                                                newEnd = addDays(b.origEnd, deltaDays);
                                                
                                                if (b.origTasks) {
                                                    newTasks = b.origTasks.map(t => {
                                                        const shiftedAllocations = (t.allocations || []).map(a => {
                                                            const shiftStart = a.start ? addDays(a.start, deltaDays) : null;
                                                            const shiftEnd = a.end ? addDays(a.end, deltaDays) : null;
                                                            if (t.assignee && shiftStart && shiftEnd) {
                                                                if (checkTeamOverlap(next, t.assignee, shiftStart, shiftEnd, a.id)) {
                                                                    anyCollision = true;
                                                                }
                                                            }
                                                            return { ...a, start: shiftStart, end: shiftEnd };
                                                        });
                                                        return syncTaskDates({ ...t, allocations: shiftedAllocations });
                                                    });
                                                }
                                            } else if (draggingBlock.type === 'resize-left') {
                                                newStart = addDays(b.origStart, deltaDays);
                                                if (newStart > newEnd) newStart = newEnd;
                                            } else if (draggingBlock.type === 'resize-right') {
                                                newEnd = addDays(b.origEnd, deltaDays);
                                                if (newEnd < newStart) newEnd = newStart;
                                            }

                                            // Only apply phase movement if NO tasks inside it will collide with existing team schedules
                                            if (!anyCollision && (newStart?.getTime() !== ph.start?.getTime() || newEnd?.getTime() !== ph.end?.getTime() || newTasks !== ph.tasks)) {
                                                const newPhases = [...next[pIndex].phases];
                                                newPhases[phIndex] = { ...ph, start: newStart, end: newEnd, tasks: newTasks };
                                                next[pIndex] = { ...next[pIndex], phases: newPhases };
                                                changed = true;
                                            }
                                        }
                                    }
                                }
                            });
                            return changed ? next : prev;
                        });
                    }
                };

                const handleMouseUp = () => {
                    if (isResizingCol) setIsResizingCol(false);
                    if (draggingBlock) {
                        setProjects(current => {
                            if (dragStartProjects.current && dragStartProjects.current !== current) {
                                setPast(p => [...p, dragStartProjects.current]);
                                setFuture([]);
                            }
                            return current;
                        });
                        setDraggingBlock(null);
                    }
                };

                if (draggingBlock || isResizingCol) {
                    window.addEventListener('mousemove', handleMouseMove);
                    window.addEventListener('mouseup', handleMouseUp);
                    window.addEventListener('touchmove', handleMouseMove, { passive: false });
                    window.addEventListener('touchend', handleMouseUp);
                }
                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('mouseup', handleMouseUp);
                    window.removeEventListener('touchmove', handleMouseMove);
                    window.removeEventListener('touchend', handleMouseUp);
                };
            }, [draggingBlock, zoomLevel, isResizingCol]);

            const handleBlockMouseDown = (e, projectId, phaseId, type, origStart, origEnd, taskId = null, allocationId = null) => {
                if(!e.touches) e.preventDefault(); // Prevent default only for mouse to avoid selecting text
                e.stopPropagation();
                
                const phase = projects.find(p => p.id === projectId)?.phases.find(ph => ph.id === phaseId);
                if (phase?.isLocked) return;

                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                lastInteractionRef.current = { isDragging: false, startX: clientX, startY: clientY };
                dragStartProjects.current = projects;

                let blocksToMove = [];
                if (allocationId && taskId) {
                    blocksToMove = [{ projectId, phaseId, taskId, allocationId, origStart, origEnd }];
                } else {
                    blocksToMove = [{ projectId, phaseId, origStart, origEnd, origTasks: phase.tasks }];
                    if (type === 'move' && selectedPhaseIds.has(phaseId)) {
                        blocksToMove = [];
                        projects.forEach(p => {
                            p.phases.forEach(ph => {
                                if (selectedPhaseIds.has(ph.id) && !ph.isLocked) {
                                    blocksToMove.push({ projectId: p.id, phaseId: ph.id, origStart: ph.start, origEnd: ph.end, origTasks: ph.tasks });
                                }
                            });
                        });
                    }
                }

                let pixelsPerDay = zoomLevel;
                if (type.includes('alloc')) {
                    const rowElem = e.currentTarget.closest('.team-row-container');
                    if (rowElem) {
                        pixelsPerDay = (rowElem.getBoundingClientRect().width / 10) * 2;
                    }
                }

                setDraggingBlock({ blocksToMove, type, startX: clientX, pixelsPerDay });
            };

            const handleBlockClick = (e, projectId, phase, colorIndex) => {
                e.stopPropagation();
                if (lastInteractionRef.current.isDragging) {
                    lastInteractionRef.current.isDragging = false; 
                    return; 
                }
                setModalData({ projectId, phase, colorIndex });
            };
            
            const handleTeamBlockClick = (e, projectId, phaseId, taskId, allocationId) => {
                e.stopPropagation();
                if (lastInteractionRef.current.isDragging) {
                    lastInteractionRef.current.isDragging = false; 
                    return; 
                }
                setTeamModalData({ projectId, phaseId, taskId, allocationId });
            };

            // --- Modal Editing Handlers ---
            const editPhaseTitle = (projectId, phaseId, newTitle) => {
                updateProjects(projects.map(p => p.id === projectId ? {
                    ...p, phases: p.phases.map(ph => ph.id === phaseId ? { ...ph, title: newTitle } : ph)
                } : p));
                if (modalData && modalData.projectId === projectId && modalData.phase.id === phaseId) {
                    setModalData({ ...modalData, phase: { ...modalData.phase, title: newTitle } });
                }
            };

            const updatePhaseDates = (projectId, phaseId, startStr, endStr) => {
                const newStart = startStr ? fromYMD(startStr) : null;
                const newEnd = endStr ? fromYMD(endStr) : null;
                
                updateProjects(projects.map(p => p.id === projectId ? {
                    ...p, phases: p.phases.map(ph => ph.id === phaseId ? { ...ph, start: newStart, end: newEnd } : ph)
                } : p));
                
                if (modalData && modalData.phase.id === phaseId) {
                    setModalData(prev => ({ ...prev, phase: { ...prev.phase, start: newStart, end: newEnd } }));
                }
            };

            const addPhaseMilestone = (projectId, phaseId) => {
                const newMilestone = { id: generateId(), date: new Date(), label: 'New Milestone' };
                updateProjects(projects.map(p => p.id === projectId ? {
                    ...p, phases: p.phases.map(ph => ph.id === phaseId ? { ...ph, milestones: [...(ph.milestones || []), newMilestone] } : ph)
                } : p));
                if (modalData && modalData.phase.id === phaseId) {
                    setModalData(prev => ({ ...prev, phase: { ...prev.phase, milestones: [...(prev.phase.milestones || []), newMilestone] } }));
                }
            };

            const updatePhaseMilestoneLabel = (projectId, phaseId, milestoneId, labelStr) => {
                updateProjects(projects.map(p => p.id === projectId ? {
                    ...p, phases: p.phases.map(ph => ph.id === phaseId ? { 
                        ...ph, 
                        milestones: (ph.milestones || []).map(m => m.id === milestoneId ? { ...m, label: labelStr } : m)
                    } : ph)
                } : p));
                if (modalData && modalData.phase.id === phaseId) {
                    setModalData(prev => ({ 
                        ...prev, 
                        phase: { 
                            ...prev.phase, 
                            milestones: (prev.phase.milestones || []).map(m => m.id === milestoneId ? { ...m, label: labelStr } : m)
                        } 
                    }));
                }
            };

            const updatePhaseMilestoneDate = (projectId, phaseId, milestoneId, dateStr) => {
                const newDate = dateStr ? fromYMD(dateStr) : null;
                updateProjects(projects.map(p => p.id === projectId ? {
                    ...p, phases: p.phases.map(ph => ph.id === phaseId ? { 
                        ...ph, 
                        milestones: (ph.milestones || []).map(m => m.id === milestoneId ? { ...m, date: newDate } : m)
                    } : ph)
                } : p));
                if (modalData && modalData.phase.id === phaseId) {
                    setModalData(prev => ({ 
                        ...prev, 
                        phase: { 
                            ...prev.phase, 
                            milestones: (prev.phase.milestones || []).map(m => m.id === milestoneId ? { ...m, date: newDate } : m)
                        } 
                    }));
                }
            };

            const removePhaseMilestone = (projectId, phaseId, milestoneId) => {
                updateProjects(projects.map(p => p.id === projectId ? {
                    ...p, phases: p.phases.map(ph => ph.id === phaseId ? { 
                        ...ph, 
                        milestones: (ph.milestones || []).filter(m => m.id !== milestoneId)
                    } : ph)
                } : p));
                if (modalData && modalData.phase.id === phaseId) {
                    setModalData(prev => ({ 
                        ...prev, 
                        phase: { 
                            ...prev.phase, 
                            milestones: (prev.phase.milestones || []).filter(m => m.id !== milestoneId)
                        } 
                    }));
                }
            };

            const removePhase = (projectId, phaseId) => {
                updateProjects(projects.map(p => p.id === projectId ? {
                    ...p, phases: p.phases.filter(ph => ph.id !== phaseId)
                } : p));
                if (modalData && modalData.phase.id === phaseId) setModalData(null);
            };

            // Main Modal Checklist Handlers
            const onDragStartTask = (e, index) => {
                e.stopPropagation();
                dragStartProjects.current = projects;
                setDraggedTaskIndex(index);
                e.dataTransfer.effectAllowed = "move";
            };
            
            const onDragOverTask = (e, targetIndex) => {
                e.preventDefault();
                e.stopPropagation();
                if (draggedTaskIndex === null || draggedTaskIndex === targetIndex) return;
                
                const newTasks = [...modalData.phase.tasks];
                const [draggedItem] = newTasks.splice(draggedTaskIndex, 1);
                newTasks.splice(targetIndex, 0, draggedItem);
                
                setModalData(prev => ({ ...prev, phase: { ...prev.phase, tasks: newTasks }}));
                setProjects(prev => prev.map(p => p.id === modalData.projectId ? {
                    ...p, phases: p.phases.map(ph => ph.id === modalData.phase.id ? { ...ph, tasks: newTasks } : ph)
                } : p));
                
                setDraggedTaskIndex(targetIndex);
            };
            
            const onDragEndTask = (e) => {
                e.stopPropagation();
                setDraggedTaskIndex(null);
                setProjects(current => {
                    if (dragStartProjects.current && dragStartProjects.current !== current) {
                        setPast(p => [...p, dragStartProjects.current]);
                        setFuture([]);
                    }
                    return current;
                });
            };

            const onDragStartMilestone = (e, index) => {
                e.stopPropagation();
                dragStartProjects.current = projects;
                setDraggedMilestoneIndex(index);
                e.dataTransfer.effectAllowed = "move";
            };
            
            const onDragOverMilestone = (e, targetIndex) => {
                e.preventDefault();
                e.stopPropagation();
                if (draggedMilestoneIndex === null || draggedMilestoneIndex === targetIndex) return;
                
                const newMilestones = [...(modalData.phase.milestones || [])];
                const [draggedItem] = newMilestones.splice(draggedMilestoneIndex, 1);
                newMilestones.splice(targetIndex, 0, draggedItem);
                
                setModalData(prev => ({ ...prev, phase: { ...prev.phase, milestones: newMilestones }}));
                setProjects(prev => prev.map(p => p.id === modalData.projectId ? {
                    ...p, phases: p.phases.map(ph => ph.id === modalData.phase.id ? { ...ph, milestones: newMilestones } : ph)
                } : p));
                
                setDraggedMilestoneIndex(targetIndex);
            };
            
            const onDragEndMilestone = (e) => {
                e.stopPropagation();
                setDraggedMilestoneIndex(null);
                setProjects(current => {
                    if (dragStartProjects.current && dragStartProjects.current !== current) {
                        setPast(p => [...p, dragStartProjects.current]);
                        setFuture([]);
                    }
                    return current;
                });
            };

            const toggleTask = (taskId) => {
                const updatedTasks = modalData.phase.tasks.map(t => t.id === taskId ? { ...t, done: !t.done } : t);
                updateTasksInState(updatedTasks);
            };

            const addTask = () => {
                const updatedTasks = [...modalData.phase.tasks, { id: generateId(), text: 'New Task', done: false, assignee: '', start: null, end: null, allocations: [] }];
                updateTasksInState(updatedTasks);
            };

            const updateTaskText = (taskId, text) => {
                const updatedTasks = modalData.phase.tasks.map(t => t.id === taskId ? { ...t, text } : t);
                updateTasksInState(updatedTasks);
            };

            const updateTaskAssignee = (taskId, assignee) => {
                const updatedTasks = modalData.phase.tasks.map(t => t.id === taskId ? { ...t, assignee } : t);
                updateTasksInState(updatedTasks);
            };

            const updateTaskDates = (taskId, startStr, endStr) => {
                const newStart = startStr ? fromYMD(startStr) : null;
                const newEnd = endStr ? fromYMD(endStr) : null;
                if (newEnd) newEnd.setHours(23, 59, 59, 999);

                // Prevent overlapping assignment when manually setting via modal
                let taskToUpdate = null;
                modalData.phase.tasks.forEach(t => { if(t.id === taskId) taskToUpdate = t; });
                
                if (taskToUpdate && taskToUpdate.assignee && newStart && newEnd) {
                    const allocId = taskToUpdate.allocations?.[0]?.id; 
                    if (checkTeamOverlap(projects, taskToUpdate.assignee, newStart, newEnd, allocId)) {
                        alert(`Cannot set dates. ${taskToUpdate.assignee} already has a task overlapping this range.`);
                        return;
                    }
                }

                const updatedTasks = modalData.phase.tasks.map(t => {
                    if (t.id === taskId) {
                        const task = { ...t, start: newStart, end: newEnd };
                        if (newStart && newEnd) {
                            task.allocations = [{ id: generateId(), start: newStart, end: newEnd, subTasks: [] }];
                        } else {
                            task.allocations = [];
                        }
                        return task;
                    }
                    return t;
                });
                updateTasksInState(updatedTasks);
            };

            const deleteTask = (taskId) => {
                const updatedTasks = modalData.phase.tasks.filter(t => t.id !== taskId);
                updateTasksInState(updatedTasks);
            };

            const updateTasksInState = (updatedTasks) => {
                updateProjects(projects.map(p => p.id === modalData.projectId ? {
                    ...p, phases: p.phases.map(ph => ph.id === modalData.phase.id ? { ...ph, tasks: updatedTasks } : ph)
                } : p));
                setModalData({ ...modalData, phase: { ...modalData.phase, tasks: updatedTasks } });
            };

            // --- Team Allocation Modal Handlers (Sub-Tasks) ---
            const updateAllocation = (projectId, phaseId, taskId, allocId, updaterFn) => {
                updateProjects(projects.map(p => p.id === projectId ? {
                    ...p, phases: p.phases.map(ph => ph.id === phaseId ? {
                        ...ph, tasks: ph.tasks.map(t => {
                            if (t.id === taskId) {
                                const newAllocations = t.allocations.map(a => a.id === allocId ? updaterFn(a) : a);
                                return { ...t, allocations: newAllocations };
                            }
                            return t;
                        })
                    } : ph)
                } : p));
            };

            const toggleSubTask = (allocId, subId) => {
                updateAllocation(teamModalData.projectId, teamModalData.phaseId, teamModalData.taskId, allocId, a => ({
                    ...a, subTasks: (a.subTasks || []).map(s => s.id === subId ? { ...s, done: !s.done } : s)
                }));
            };

            const addSubTask = (allocId) => {
                updateAllocation(teamModalData.projectId, teamModalData.phaseId, teamModalData.taskId, allocId, a => ({
                    ...a, subTasks: [...(a.subTasks || []), { id: generateId(), text: 'New Sub-task', done: false }]
                }));
            };

            const updateSubTaskText = (allocId, subId, text) => {
                updateAllocation(teamModalData.projectId, teamModalData.phaseId, teamModalData.taskId, allocId, a => ({
                    ...a, subTasks: (a.subTasks || []).map(s => s.id === subId ? { ...s, text } : s)
                }));
            };

            const deleteSubTask = (allocId, subId) => {
                updateAllocation(teamModalData.projectId, teamModalData.phaseId, teamModalData.taskId, allocId, a => ({
                    ...a, subTasks: (a.subTasks || []).filter(s => s.id !== subId)
                }));
            };


            // --- Render Helpers ---
            const months = [];
            const weeks = [];
            const daysList = [];
            let currentMonth = -1;
            let weeksInMonth = 0;

            for (let i = 0; i < totalDays; i++) {
                const d = addDays(timelineStart, i);
                daysList.push({
                    date: d,
                    label: d.getDate(),
                    dayName: d.toLocaleDateString('en-US', { weekday: 'narrow' }),
                    isWeekend: d.getDay() === 0 || d.getDay() === 6
                });
            }

            for (let i = 0; i < totalDays; i += 7) {
                const weekStart = addDays(timelineStart, i);
                const weekEnd = addDays(weekStart, 6);
                
                weeks.push({
                    start: weekStart,
                    end: weekEnd,
                    label: `${formatDate(weekStart)} - ${formatDate(weekEnd)}`,
                    daysFromStart: i
                });

                const month = weekStart.getMonth();
                if (month !== currentMonth) {
                    if (currentMonth !== -1) {
                        months[months.length - 1].colSpan = weeksInMonth * 7;
                    }
                    months.push({
                        name: weekStart.toLocaleDateString('en-US', { month: 'long', year: 'numeric' }),
                        colSpan: 7
                    });
                    currentMonth = month;
                    weeksInMonth = 1;
                } else {
                    weeksInMonth++;
                    months[months.length - 1].colSpan = weeksInMonth * 7;
                }
            }
            if (months.length > 0) months[months.length - 1].colSpan = weeksInMonth * 7;

            const gridWidth = totalDays * zoomLevel;
            const activeProject = modalData ? projects.find(p => p.id === modalData.projectId) : null;

            return (
                <div className="flex flex-col h-[100dvh] w-full absolute inset-0 overflow-hidden bg-slate-50">
                    <datalist id="standard-phases-list">
                        {STANDARD_TEMPLATE_PHASES.map((p, i) => <option key={i} value={p.title} />)}
                        <option value="Client Handover" />
                        <option value="Post-Project Support" />
                    </datalist>

                    {/* Header */}
                    <div className="flex-shrink-0 bg-slate-900 text-white px-2 py-1.5 md:px-4 md:py-2 shadow-md flex flex-col lg:flex-row justify-between items-center z-50 relative gap-1.5 md:gap-2">
                        <div className="w-full text-center lg:text-left flex flex-col justify-center">
                            <input 
                                type="text" 
                                value={appTitle} 
                                onChange={(e) => setAppTitle(e.target.value)}
                                className="bg-transparent text-base md:text-lg font-bold border-b border-transparent hover:border-slate-500 focus:border-blue-400 focus:outline-none transition-colors w-full md:w-80 text-center lg:text-left leading-tight"
                            />
                            <p className="text-slate-400 text-[9px] md:text-[10px] hidden md:block">Interior Design Timeline & Task Management</p>
                        </div>
                        <div className="flex flex-wrap items-center justify-center lg:justify-end gap-1.5 w-full">
                            
                            {/* View Toggle */}
                            <div className="flex bg-slate-800 rounded p-0.5">
                                <button onClick={() => setViewMode('projects')} className={`px-2 py-1 rounded text-[10px] md:text-xs font-medium transition-colors flex items-center gap-1 ${viewMode === 'projects' ? 'bg-slate-600 text-white shadow' : 'text-slate-400 hover:text-slate-200'}`}>
                                    <Icons.Layout className="w-3 h-3"/> Projects
                                </button>
                                <button onClick={() => setViewMode('team')} className={`px-2 py-1 rounded text-[10px] md:text-xs font-medium transition-colors flex items-center gap-1 ${viewMode === 'team' ? 'bg-slate-600 text-white shadow' : 'text-slate-400 hover:text-slate-200'}`}>
                                    <Icons.Users className="w-3 h-3"/> Team View
                                </button>
                            </div>

                            {/* Cloud Save / Load / Export */}
                            <div className="flex items-center gap-1 bg-slate-800 rounded px-1.5 py-0.5">
                                <button onClick={saveToCloud} disabled={isSaving || isLoading || isExporting} className="p-1 rounded text-slate-300 hover:text-white hover:bg-slate-700 disabled:opacity-50 flex items-center gap-1 text-[10px] md:text-xs font-medium" title="Save to Cloud">
                                    {isSaving ? <Icons.Spinner /> : <Icons.CloudUpload />} <span className="hidden md:inline">Save</span>
                                </button>
                                <div className="w-px h-3 bg-slate-600 mx-0.5"></div>
                                <button onClick={loadFromCloud} disabled={isSaving || isLoading || isExporting} className="p-1 rounded text-slate-300 hover:text-white hover:bg-slate-700 disabled:opacity-50 flex items-center gap-1 text-[10px] md:text-xs font-medium" title="Load from Cloud">
                                    {isLoading ? <Icons.Spinner /> : <Icons.CloudDownload />} <span className="hidden md:inline">Load</span>
                                </button>
                                <div className="w-px h-3 bg-slate-600 mx-0.5"></div>
                                <button onClick={exportToPDF} disabled={isSaving || isLoading || isExporting} className="p-1 rounded text-slate-300 hover:text-white hover:bg-slate-700 disabled:opacity-50 flex items-center gap-1 text-[10px] md:text-xs font-medium" title="Export as PDF">
                                    {isExporting ? <Icons.Spinner /> : <Icons.Download />} <span className="hidden md:inline">PDF</span>
                                </button>
                            </div>

                            {/* Undo / Redo */}
                            <div className="flex items-center gap-0.5 bg-slate-800 rounded px-1 py-0.5">
                                <button onClick={undo} disabled={past.length === 0} className={`p-1 rounded ${past.length > 0 ? 'text-slate-300 hover:text-white hover:bg-slate-700' : 'text-slate-600 cursor-not-allowed'}`} title="Undo">
                                    <Icons.Undo />
                                </button>
                                <button onClick={redo} disabled={future.length === 0} className={`p-1 rounded ${future.length > 0 ? 'text-slate-300 hover:text-white hover:bg-slate-700' : 'text-slate-600 cursor-not-allowed'}`} title="Redo">
                                    <Icons.Redo />
                                </button>
                            </div>

                            {viewMode === 'projects' && (
                                <div className="flex items-center gap-1.5 md:gap-2">
                                    <button onClick={scrollToToday} className="text-[10px] md:text-xs text-slate-300 hover:text-white border border-slate-600 hover:border-slate-400 rounded px-2 py-1 transition-colors font-medium">
                                        Today
                                    </button>
                                    <div className="flex items-center gap-1">
                                        <span className="text-[9px] md:text-[10px] text-slate-400 hidden md:inline uppercase font-bold tracking-wider">Zoom</span>
                                        <input 
                                            type="range" min="5" max="100" value={zoomLevel} onChange={(e) => setZoomLevel(Number(e.target.value))}
                                            className="w-16 md:w-20 accent-blue-500"
                                        />
                                    </div>
                                    <button onClick={addProject} className="flex items-center gap-1 bg-blue-600 hover:bg-blue-500 px-2 md:px-3 py-1 rounded text-[10px] md:text-xs font-medium transition-colors">
                                        <Icons.Plus /> Add Project
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* --- MAIN CONTENT AREA --- */}
                    {viewMode === 'projects' ? (
                        /* ========================================= */
                        /* PROJECTS VIEW               */
                        /* ========================================= */
                        <div className="flex-1 overflow-auto overscroll-none bg-white relative" ref={scrollContainerRef}>
                            <div className="relative min-w-full w-max min-h-full">
                                
                                {/* Grid Background */}
                                <div className="absolute top-[60px] bottom-0 flex pointer-events-none z-0" style={{ left: leftColWidth, width: gridWidth }}>
                                    {weeks.map((w, i) => (
                                        <div key={i} className="h-full border-r border-slate-300 relative" style={{ width: 7 * zoomLevel, minWidth: 7 * zoomLevel }}>
                                            <div className="absolute inset-0 flex">
                                                {[...Array(7)].map((_, dayIdx) => (
                                                    <div key={dayIdx} className="h-full border-r border-slate-100 border-dashed" style={{ width: zoomLevel }}></div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {/* Red Line */}

                                                        <button onClick={() => deleteTask(task.id)} disabled={modalData.phase.isLocked} className={`p-2 md:p-0 w-8 md:w-5 ${modalData.phase.isLocked ? 'text-slate-300 cursor-not-allowed' : 'opacity-100 md:opacity-0 md:group-hover:opacity-100 text-slate-400 hover:text-red-500 transition-opacity'}`}>
                                                            <Icons.Trash />
                                                        </button>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                    <button onClick={addTask} disabled={modalData.phase.isLocked} className={`text-sm md:text-xs font-medium flex items-center justify-center border border-dashed border-blue-200 w-full p-3 rounded gap-2 mt-2 ${modalData.phase.isLocked ? 'text-slate-400 cursor-not-allowed border-slate-200' : 'text-blue-600 hover:bg-blue-50'}`}>
                                        <Icons.Plus /> Add New Task
                                    </button>
                                </div>
                                
                                {/* Modal Footer */}
                                <div className="bg-slate-50 p-4 border-t border-slate-200 flex justify-between items-center shrink-0">
                                    <button onClick={() => removePhase(activeProject.id, modalData.phase.id)} className="text-sm md:text-xs text-red-500 hover:text-red-700 font-medium p-2">Delete Phase</button>
                                    <button onClick={() => setModalData(null)} className="bg-slate-800 hover:bg-slate-700 text-white text-base md:text-sm font-medium px-8 py-3 md:py-2 rounded-lg md:rounded shadow-sm">Done</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Team View Specific Modal (Sub-Tasks per Allocation Block) */}
                    {teamModalData && (() => {
                        const project = projects.find(p => p.id === teamModalData.projectId);
                        const phase = project?.phases.find(ph => ph.id === teamModalData.phaseId);
                        const task = phase?.tasks.find(t => t.id === teamModalData.taskId);
                        const allocation = task?.allocations?.find(a => a.id === teamModalData.allocationId);
                        
                        if (!allocation) return null;

                        return (
                            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[60] flex justify-center items-end md:items-center p-0 md:p-2" onMouseDown={() => setTeamModalData(null)}>
                                <div className="bg-white rounded-t-xl md:rounded-xl shadow-2xl w-full max-w-[450px] overflow-hidden flex flex-col max-h-[90vh]" onMouseDown={e => e.stopPropagation()}>
                                    {/* Header */}
                                    <div className="p-5 text-white flex justify-between items-start" style={{ backgroundColor: getPhaseColor(project.color, 1) }}>
                                        <div>
                                            <p className="text-xs opacity-80 font-medium uppercase mb-1 tracking-wider">{project.title} / {phase.title}</p>
                                            <h2 className="text-xl font-bold leading-tight">{task.text}</h2>
                                        </div>
                                        <button onClick={() => setTeamModalData(null)} className="p-2 hover:bg-black/10 rounded-full transition-colors bg-black/5"><Icons.X /></button>
                                    </div>
                                    
                                    {/* Body */}
                                    <div className="p-5 overflow-y-auto">
                                        <div className="text-xs text-slate-600 mb-6 bg-blue-50 border border-blue-100 p-4 rounded shadow-sm flex items-center justify-between">
                                            <div>
                                                <strong>Scheduled Block: </strong><br/>
                                                <span className="text-sm mt-1 inline-block">
                                                    {formatDate(allocation.start)} ({allocation.start.getHours() < 12 ? 'AM' : 'PM'}) 
                                                    {" - "} 
                                                    {formatDate(allocation.end)} ({allocation.end.getHours() < 12 ? 'AM' : 'PM'})
                                                </span>
                                            </div>
                                        </div>

                                        <div className="flex justify-between items-end mb-4 border-b border-slate-100 pb-2">
                                            <h3 className="text-sm font-semibold text-slate-800">Daily Sub-Tasks</h3>
                                            <span className="text-[10px] text-slate-400">Hidden from main project view</span>
                                        </div>
                                        
                                        <div className="space-y-3">
                                            {(!allocation.subTasks || allocation.subTasks.length === 0) ? (
                                                <p className="text-sm text-slate-400 italic py-4 text-center">No sub-tasks added.</p>
                                            ) : (
                                                allocation.subTasks.map(sub => (
                                                    <div key={sub.id} className="flex items-center gap-3 group border border-slate-100 rounded p-2 hover:bg-slate-50">
                                                        <input 
                                                            type="checkbox" 
                                                            checked={sub.done} 
                                                            onChange={() => toggleSubTask(allocation.id, sub.id)} 
                                                            className="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer accent-blue-500 flex-shrink-0"
                                                        />
                                                        <input 
                                                            value={sub.text} 
                                                            onChange={(e) => updateSubTaskText(allocation.id, sub.id, e.target.value)} 
                                                            className={`flex-1 text-base bg-transparent border-b border-transparent focus:border-slate-300 focus:outline-none py-1 ${sub.done ? 'text-slate-400 line-through' : 'text-slate-700'}`}
                                                            placeholder="Sub-task details..."
                                                        />
                                                        <button onClick={() => deleteSubTask(allocation.id, sub.id)} className="opacity-100 md:opacity-0 md:group-hover:opacity-100 text-slate-400 hover:text-red-500 transition-opacity p-2">
                                                            <Icons.Trash />
                                                        </button>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                        <button onClick={() => addSubTask(allocation.id)} className="text-sm font-medium text-blue-600 hover:text-blue-800 flex items-center justify-center border border-dashed border-blue-200 rounded p-3 gap-2 mt-4 w-full">
                                            <Icons.Plus /> Add Sub-Task
                                        </button>
                                    </div>

                                    {/* Footer */}
                                    <div className="bg-slate-50 p-4 border-t border-slate-200 pb-8 md:pb-4">
                                        <button onClick={() => setTeamModalData(null)} className="w-full bg-slate-800 hover:bg-slate-700 text-white text-base font-bold py-3 rounded-lg shadow-md">Done</button>
                                    </div>
                                </div>
                            </div>
                        )
                    })()}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
