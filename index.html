<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DesignSpec | Material Specification</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    /* Custom Scrollbar for a cleaner look */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d4d4d4; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #a3a3a3; }
    
    .highlight-supplier { background-color: #bfdbfe; color: #1e3a8a; border: 1px solid #93c5fd; }
    .highlight-productName { background-color: #bbf7d0; color: #14532d; border: 1px solid #86efac; }
    .highlight-productCode { background-color: #fef08a; color: #713f12; border: 1px solid #fde047; }
    .highlight-colour { background-color: #fbcfe8; color: #831843; border: 1px solid #f9a8d4; }
    .highlight-finishTreatment { background-color: #e9d5ff; color: #581c87; border: 1px solid #d8b4fe; }
    .highlight-size { background-color: #c7d2fe; color: #312e81; border: 1px solid #a5b4fc; }
    .highlight-fireRating { background-color: #fecaca; color: #7f1d1d; border: 1px solid #fca5a5; }
    .highlight-image { background-color: #99f6e4; color: #134e4a; border: 1px solid #5eead4; }
  </style>
</head>
<body class="flex h-screen w-full bg-neutral-100 text-neutral-800 font-sans overflow-hidden">

  <!-- SIDEBAR NAVIGATION -->
  <aside id="sidebar" class="bg-neutral-900 text-white transition-all duration-300 ease-in-out flex flex-col h-full border-r border-neutral-800 z-20 shrink-0 w-64 sm:w-72 overflow-hidden">
    <div class="p-5 flex items-center gap-3 border-b border-neutral-800 shrink-0">
      <div class="bg-white/10 p-2 rounded-lg text-white"><i class="ph ph-stack text-xl"></i></div>
      <h1 class="text-lg font-semibold whitespace-nowrap tracking-wide">DesignSpec</h1>
    </div>
    
    <div class="flex-1 overflow-y-auto py-6 flex flex-col gap-6">
      <div>
        <div class="px-5 mb-3 text-xs font-semibold text-neutral-500 uppercase tracking-wider">Your Projects</div>
        <ul id="sidebar-projects-list" class="space-y-1 px-3">
          <!-- Populated by JS -->
        </ul>
        <div class="px-4 mt-2">
          <button onclick="App.createProject()" class="w-full flex items-center justify-center gap-2 bg-white/5 hover:bg-white/10 text-neutral-300 py-2 rounded-lg transition-colors text-sm font-medium">
            <i class="ph ph-folder-plus text-base"></i> New Project
          </button>
        </div>
      </div>

      <div>
        <div class="px-5 mb-3 text-xs font-semibold text-neutral-500 uppercase tracking-wider">System</div>
        <ul class="space-y-1 px-3">
          <li>
            <button onclick="App.setView('suppliers')" id="nav-suppliers" class="w-full text-left px-3 py-2.5 rounded-lg flex items-center gap-2 transition-colors text-neutral-400 hover:bg-neutral-800/50 hover:text-neutral-200">
              <i class="ph ph-database text-base nav-icon"></i><span class="text-sm font-medium">Supplier Database</span>
            </button>
            <div id="sidebar-suppliers-list" class="hidden mt-1 mb-2 ml-7 pl-2 border-l border-neutral-700 space-y-1">
              <!-- Populated by JS -->
            </div>
          </li>
          <li>
            <button onclick="App.setView('templates')" id="nav-templates" class="w-full text-left px-3 py-2.5 rounded-lg flex items-center gap-2 transition-colors text-neutral-400 hover:bg-neutral-800/50 hover:text-neutral-200">
              <i class="ph ph-layout text-base nav-icon"></i><span class="text-sm font-medium">Material Templates</span>
            </button>
            <div id="sidebar-templates-list" class="hidden mt-1 ml-7 pl-2 border-l border-neutral-700 space-y-1">
              <!-- Populated by JS -->
            </div>
          </li>
        </ul>
      </div>
    </div>
  </aside>

  <!-- MAIN CONTENT CONTAINER -->
  <div class="flex-1 flex flex-col h-screen overflow-y-auto relative bg-neutral-50">
    
    <!-- TOP HEADER -->
    <header class="bg-white shadow-sm border-b border-neutral-200 sticky top-0 z-30 px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between gap-4">
      <div class="flex items-center gap-4 flex-1">
        <button onclick="App.toggleSidebar()" class="p-2 -ml-2 rounded-md hover:bg-neutral-100 text-neutral-500 hover:text-neutral-800 transition-colors shrink-0">
          <i id="sidebar-toggle-icon" class="ph ph-list text-2xl"></i>
        </button>
        <div id="header-title-container" class="flex items-center flex-1 overflow-hidden">
          <!-- Dynamic Header Title -->
        </div>
      </div>
      <button id="sync-indicator" onclick="App.openSettings()" class="flex items-center gap-2 text-xs font-medium text-neutral-500 shrink-0 bg-neutral-100 hover:bg-neutral-200 px-3 py-1.5 rounded-full border border-neutral-200 transition-colors cursor-pointer">
        <i class="ph ph-cloud-slash text-sm text-neutral-400"></i> Local Only
      </button>
    </header>

    <!-- VIEWS -->
    <main id="main-view" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full flex flex-col gap-6">
      <!-- Injected by JavaScript based on active view -->
    </main>

  </div>

  <!-- FLOATING HIGHLIGHT MENU (Hidden by default) -->
  <div id="highlight-menu" class="hidden absolute bg-neutral-900 text-white rounded-lg shadow-xl p-2 flex-wrap gap-1 z-50 items-center max-w-[95vw] w-max">
    <span class="text-xs font-medium text-neutral-400 px-2 py-1.5 border-r border-neutral-700 shrink-0">Map to:</span>
    <!-- Buttons injected by JS -->
    <button onclick="App.Trainer.closeMenu()" class="ml-auto px-2 py-1.5 text-neutral-400 hover:text-white">✕</button>
  </div>

  <!-- SETTINGS MODAL -->
  <div id="settings-modal" class="hidden fixed inset-0 bg-black/50 z-[100] flex items-center justify-center backdrop-blur-sm">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md p-6 border border-neutral-200 mx-4">
      <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-neutral-800"><i class="ph ph-gear"></i> Cloud Storage Settings</h2>
      <p class="text-sm text-neutral-600 mb-6">Connect to Upstash Redis (Vercel KV) to sync your data across devices. Your credentials are saved locally in your browser.</p>
      
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-neutral-500 uppercase tracking-wider mb-1">KV REST API URL</label>
          <input type="text" id="setting-kv-url" class="w-full px-3 py-2 border border-neutral-300 rounded-md text-sm focus:ring-2 focus:ring-blue-500" placeholder="https://liberal-gazelle-12345.upstash.io" />
        </div>
        <div>
          <label class="block text-xs font-bold text-neutral-500 uppercase tracking-wider mb-1">KV REST API TOKEN</label>
          <input type="password" id="setting-kv-token" class="w-full px-3 py-2 border border-neutral-300 rounded-md text-sm focus:ring-2 focus:ring-blue-500" placeholder="AYZ...xyz" />
        </div>
      </div>
      
      <div class="mt-6 flex justify-end gap-3">
        <button onclick="App.closeSettings()" class="px-4 py-2 text-sm font-medium text-neutral-600 hover:bg-neutral-100 rounded-md transition-colors">Cancel</button>
        <button onclick="App.saveSettings()" class="px-4 py-2 text-sm font-medium bg-neutral-900 text-white hover:bg-neutral-800 rounded-md transition-colors flex items-center gap-2"><i class="ph ph-link"></i> Connect & Sync</button>
      </div>
    </div>
  </div>

  <!-- TOAST CONTAINER -->
  <div id="toast-container" class="fixed bottom-4 right-4 z-[110] flex flex-col gap-2"></div>

  <script>
    /**
     * ==========================================
     * 1. GLOBAL STATE & CONFIGURATION
     * ==========================================
     */
    
    // --- UPSTASH REDIS (VERCEL KV) CREDENTIALS ---
    // WARNING: Hardcoding API tokens in client-side code is a severe security risk.
    // Anyone who views the page source can access and manipulate your Upstash database.
    // This setup is strictly for private/local usage. Do not deploy this publicly.
    const VERCEL_KV_REST_API_URL = "https://awaited-drake-76193.upstash.io"; 
    const VERCEL_KV_REST_API_TOKEN = "gQAAAAAAASmhAAIncDFiOGQ3N2EyNWRmNzM0NzdlOGM4MDVhZWMyY2NiZTJiMXAxNzYxOTM";

    const currentAppId = typeof __app_id !== 'undefined' ? __app_id : 'designspec-app-data';
    const KV_KEY = `designspec_state_${currentAppId}`;
    const LOCAL_STORAGE_KEY = `designspec_local_${currentAppId}`;

    let KV_REST_API_URL = localStorage.getItem('KV_REST_API_URL') || VERCEL_KV_REST_API_URL; 
    let KV_REST_API_TOKEN = localStorage.getItem('KV_REST_API_TOKEN') || VERCEL_KV_REST_API_TOKEN;

    const highlightColors = {
      supplier: 'bg-blue-200 text-blue-900 border-blue-300',
      productName: 'bg-green-200 text-green-900 border-green-300',
      productCode: 'bg-yellow-200 text-yellow-900 border-yellow-300',
      colour: 'bg-pink-200 text-pink-900 border-pink-300',
      finishTreatment: 'bg-purple-200 text-purple-900 border-purple-300',
      size: 'bg-indigo-200 text-indigo-900 border-indigo-300',
      fireRating: 'bg-red-200 text-red-900 border-red-300',
      image: 'bg-teal-200 text-teal-900 border-teal-300'
    };

    const STANDARD_CATEGORIES = [
      { id: 'cat-1000', name: 'Architectural Finishes - 1000' },
      { id: 'cat-2000', name: 'Furniture & Equipment - 2000' },
      { id: 'cat-3000', name: 'Decorative Lighting - 3000' },
      { id: 'cat-4000', name: 'Sanitary Ware & Fittings - 4000' },
      { id: 'cat-5000', name: 'Hardware Finishes - 5000' },
      { id: 'cat-6000', name: 'Accessories - 6000' }
    ];

    const defaultState = {
      projects: [{ 
        id: 1, 
        title: 'New Project Specification', 
        categories: [...STANDARD_CATEGORIES],
        areas: [{ id: 'area-1', name: 'General Area' }],
        materials: [] 
      }],
      templates: [{
        id: 'tmpl-1',
        name: 'Standard Material',
        abbreviation: 'STD',
        fields: [
          { id: 'productCode', label: 'Product Code' },
          { id: 'colour', label: 'Colour' },
          { id: 'finishTreatment', label: 'Finish/ Treatment' },
          { id: 'size', label: 'Size' },
          { id: 'fireRating', label: 'Fire Rating' },
          { id: 'relatedDrawings', label: 'Related Drawings' }
        ]
      }],
      suppliers: [{ 
        id: 'sup-1', 
        name: 'Porcelanosa', 
        domain: 'porcelanosa.com', 
        mappings: { 
          supplier: { text: 'PORCELANOSA Grupo', selector: 'header h1' }, 
          productName: { text: 'Bottega Caliza', selector: '.product-title' }, 
          productCode: { text: '100234567', selector: '.sku' }, 
          colour: { text: 'Warm Grey', selector: '.color' }, 
          finishTreatment: { text: 'Matte Honed', selector: '.finish' }, 
          size: { text: '120x120cm', selector: '.size' }, 
          fireRating: { text: 'A1', selector: '.fire' }, 
          image: { text: '', selector: 'img.main' } 
        } 
      }]
    };

    // Central App State
    let state = {
      view: 'projects', // 'projects', 'suppliers', 'templates'
      isSidebarOpen: true,
      syncStatus: 'offline',
      
      // Projects
      projects: [...defaultState.projects],
      activeProjectId: 1,
      activeCategoryId: 'all',
      activeAreaId: 'all',
      isSpecLogOpen: true,
      searchQuery: '',
      sortConfig: 'date-desc',
      
      // Form & Editing
      editingMaterialId: null,
      formData: {},
      
      // Templates
      templates: [...defaultState.templates],
      activeTemplateId: 'tmpl-1',
      
      // Suppliers & Trainer
      suppliers: [...defaultState.suppliers],
      activeSupplierId: 'sup-1',
      trainerTemplateId: 'tmpl-1', // Which template properties to follow in trainer
      simulatedUrl: 'https://porcelanosa.com/product/sample',
      extractedText: '',
      manualHtml: '',
      isManualInput: false,
      isLoadingPage: false,
      pageLoaded: false,
      localMappings: {}, // Temporary mappings while training
      highlightMenu: { visible: false, x: 0, y: 0, text: '' }, // Initialize to prevent undefined errors
      activeMappingField: null, // Tracks the currently active legend property
      
      // Extractor Tool
      selectedExtractSupplier: '',
      pasteHtml: '',
      isExtracting: false
    };

    let debounceTimer;
    let parsedDoc = null; // Holds the fetched HTML DOM for mapping

    /**
     * ==========================================
     * 2. CORE APP ENGINE (Rendering & Logic)
     * ==========================================
     */
    const App = {
      init: async function() {
        this.resetFormData();
        await this.Cloud.init();
        this.renderAll();
        this.setupHighlightMenu();
      },

      getDynamicMappingFields: function() {
        const tmplId = state.trainerTemplateId || (state.templates[0] ? state.templates[0].id : null);
        const tmpl = state.templates.find(t => t.id === tmplId);
        
        const baseFields = [
          { key: 'supplier', label: 'Supplier' },
          { key: 'productName', label: 'Product Name' },
          { key: 'productCode', label: 'Product Code' },
          { key: 'image', label: 'Image URL' }
        ];
        
        if (!tmpl) return baseFields;
        
        const dynamicFields = (tmpl.fields || []).map(f => ({ key: f.id, label: f.label }));
        return [...baseFields, ...dynamicFields];
      },

      getHighlightColor: function(key, index) {
        if (highlightColors[key]) return highlightColors[key];
        const palette = [
            'bg-orange-200 text-orange-900 border-orange-300',
            'bg-cyan-200 text-cyan-900 border-cyan-300',
            'bg-lime-200 text-lime-900 border-lime-300',
            'bg-fuchsia-200 text-fuchsia-900 border-fuchsia-300',
            'bg-rose-200 text-rose-900 border-rose-300'
        ];
        return palette[index % palette.length];
      },

      toast: function(message, type = 'info') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        const colors = type === 'error' ? 'bg-red-600 text-white' : type === 'success' ? 'bg-green-600 text-white' : 'bg-neutral-800 text-white';
        toast.className = `${colors} px-4 py-2 rounded shadow-lg text-sm transition-opacity duration-300 opacity-0`;
        toast.textContent = message;
        container.appendChild(toast);
        
        // Trigger reflow
        void toast.offsetWidth;
        
        toast.classList.remove('opacity-0');
        
        setTimeout(() => {
          toast.classList.add('opacity-0');
          setTimeout(() => toast.remove(), 300);
        }, 3000);
      },

      setState: function(updates, skipRender = false) {
        state = { ...state, ...updates };
        if (!skipRender) this.renderAll();
        this.Cloud.save();
      },

      setView: function(viewId) {
        if(viewId === 'suppliers') {
            const actSup = state.suppliers.find(s => s.id === state.activeSupplierId) || state.suppliers[0];
            state.localMappings = actSup?.mappings ? JSON.parse(JSON.stringify(actSup.mappings)) : {};
            state.simulatedUrl = `https://${actSup?.domain || 'example.com'}/product/sample`;
            state.extractedText = '';
            state.pageLoaded = false;
            state.isManualInput = false;
            state.manualHtml = '';
            state.activeMappingField = null;
        }
        this.setState({ view: viewId, editingMaterialId: null });
        this.resetFormData();
      },

      toggleSidebar: function() {
        const sidebar = document.getElementById('sidebar');
        const icon = document.getElementById('sidebar-toggle-icon');
        state.isSidebarOpen = !state.isSidebarOpen;
        
        if(state.isSidebarOpen) {
          sidebar.classList.remove('w-0');
          sidebar.classList.add('w-64', 'sm:w-72');
          icon.className = 'ph ph-list text-2xl';
        } else {
          sidebar.classList.add('w-0');
          sidebar.classList.remove('w-64', 'sm:w-72');
          icon.className = 'ph ph-list text-2xl'; // List icon for both
        }
      },

      openSettings: function() {
        document.getElementById('setting-kv-url').value = KV_REST_API_URL;
        document.getElementById('setting-kv-token').value = KV_REST_API_TOKEN;
        document.getElementById('settings-modal').classList.remove('hidden');
      },

      closeSettings: function() {
        document.getElementById('settings-modal').classList.add('hidden');
      },

      saveSettings: async function() {
        const url = document.getElementById('setting-kv-url').value.trim();
        const token = document.getElementById('setting-kv-token').value.trim();
        
        KV_REST_API_URL = url;
        KV_REST_API_TOKEN = token;
        localStorage.setItem('KV_REST_API_URL', url);
        localStorage.setItem('KV_REST_API_TOKEN', token);
        
        this.closeSettings();
        
        if (url && token) {
            state.syncStatus = 'syncing';
            this.renderHeader();
            await this.Cloud.fetch();
            this.renderAll();
            this.Cloud.save(); // Force save if successful
        } else {
            state.syncStatus = 'offline';
            this.renderHeader();
        }
      },

      renderAll: function() {
        this.renderSidebar();
        this.renderHeader();
        
        const main = document.getElementById('main-view');
        if (state.view === 'projects') main.innerHTML = this.Views.Projects();
        else if (state.view === 'templates') main.innerHTML = this.Views.Templates();
        else if (state.view === 'suppliers') main.innerHTML = this.Views.Suppliers();
        
        // Re-attach specific DOM event listeners after innerHTML replacement
        if (state.view === 'suppliers' && state.pageLoaded) {
            const container = document.getElementById('extracted-text-container');
            if (container) {
                container.addEventListener('mouseup', this.Trainer.handleSelection);
                container.addEventListener('dblclick', this.Trainer.handleSelection);
                container.addEventListener('touchend', this.Trainer.handleSelection);
            }
        }
      },

      renderSidebar: function() {
        const pList = document.getElementById('sidebar-projects-list');
        pList.innerHTML = state.projects.map(p => `
          <li>
            <button onclick="App.setActiveProject(${p.id})" class="w-full text-left px-3 py-2.5 rounded-lg flex items-center justify-between group transition-colors ${state.view === 'projects' && state.activeProjectId === p.id ? 'bg-neutral-800 text-white' : 'text-neutral-400 hover:bg-neutral-800/50 hover:text-neutral-200'}">
              <div class="flex items-center gap-2 overflow-hidden">
                <i class="ph ${state.view === 'projects' && state.activeProjectId === p.id ? 'ph-caret-down text-neutral-400' : 'ph-caret-right text-neutral-500 group-hover:text-neutral-400'}"></i>
                <i class="ph ph-folder ${state.view === 'projects' && state.activeProjectId === p.id ? 'text-blue-400' : ''}"></i>
                <span class="truncate text-sm font-medium">${p.title}</span>
              </div>
              ${state.projects.length > 1 ? `<div class="p-1 rounded opacity-0 group-hover:opacity-100 hover:bg-neutral-700 hover:text-red-400 shrink-0 transition-all" onclick="event.stopPropagation(); App.deleteProject(${p.id})"><i class="ph ph-trash"></i></div>` : ''}
            </button>
            ${state.view === 'projects' && state.activeProjectId === p.id && p.areas ? `
              <div class="mt-1 mb-2 ml-7 pl-2 border-l border-neutral-700 space-y-1">
                ${p.areas.map(a => `
                  <button onclick="App.setState({activeAreaId: '${a.id}'})" class="w-full text-left px-3 py-1.5 text-sm rounded-md transition-colors flex items-center gap-2 ${state.activeAreaId === a.id ? 'bg-neutral-700 text-white font-medium' : 'text-neutral-400 hover:bg-neutral-700/50 hover:text-neutral-200'}">
                    <span class="w-1 h-1 rounded-full bg-current opacity-50 shrink-0"></span><span class="truncate">${a.name}</span>
                  </button>
                `).join('')}
              </div>
            ` : ''}
          </li>
        `).join('');

        // Navigation toggles
        document.getElementById('nav-suppliers').className = `w-full text-left px-3 py-2.5 rounded-lg flex items-center gap-2 transition-colors ${state.view === 'suppliers' ? 'bg-neutral-800 text-white' : 'text-neutral-400 hover:bg-neutral-800/50 hover:text-neutral-200'}`;
        document.getElementById('nav-templates').className = `w-full text-left px-3 py-2.5 rounded-lg flex items-center gap-2 transition-colors ${state.view === 'templates' ? 'bg-neutral-800 text-white' : 'text-neutral-400 hover:bg-neutral-800/50 hover:text-neutral-200'}`;
        
        const supList = document.getElementById('sidebar-suppliers-list');
        const tmpList = document.getElementById('sidebar-templates-list');
        
        if (state.view === 'suppliers') {
            supList.classList.remove('hidden');
            supList.innerHTML = state.suppliers.map(s => `
                <button onclick="App.setActiveSupplier('${s.id}')" class="w-full text-left px-3 py-1.5 text-sm rounded-md transition-colors flex items-center gap-2 ${state.activeSupplierId === s.id ? 'bg-neutral-700 text-white font-medium' : 'text-neutral-400 hover:bg-neutral-700/50 hover:text-neutral-200'}">
                    <span class="truncate">${s.name}</span>
                </button>
            `).join('') + `<button onclick="App.addSupplier()" class="w-full mt-2 flex items-center gap-2 bg-white/5 hover:bg-white/10 text-neutral-300 py-1.5 px-3 rounded-md transition-colors text-xs font-medium"><i class="ph ph-plus"></i> Add Supplier</button>`;
        } else { supList.classList.add('hidden'); }

        if (state.view === 'templates') {
            tmpList.classList.remove('hidden');
            tmpList.innerHTML = state.templates.map(t => `
                <button onclick="App.setActiveTemplate('${t.id}')" class="w-full text-left px-3 py-1.5 text-sm rounded-md transition-colors flex items-center gap-2 ${state.activeTemplateId === t.id ? 'bg-neutral-700 text-white font-medium' : 'text-neutral-400 hover:bg-neutral-700/50 hover:text-neutral-200'}">
                    <span class="truncate">${t.name}</span>
                </button>
            `).join('') + `<button onclick="App.addTemplate()" class="w-full mt-2 flex items-center gap-2 bg-white/5 hover:bg-white/10 text-neutral-300 py-1.5 px-3 rounded-md transition-colors text-xs font-medium"><i class="ph ph-plus"></i> Add Template</button>`;
        } else { tmpList.classList.add('hidden'); }
      },

      renderHeader: function() {
        const container = document.getElementById('header-title-container');
        if (state.view === 'projects') {
            const activeProj = state.projects.find(p => p.id === state.activeProjectId);
            container.innerHTML = `
                <i class="ph ph-pencil-simple text-neutral-400 mr-2 shrink-0 hidden sm:block text-lg"></i>
                <input type="text" value="${activeProj ? activeProj.title : ''}" onchange="App.updateProjectTitle(this.value)" class="text-lg sm:text-2xl font-bold bg-transparent border-b-2 border-transparent hover:border-neutral-300 focus:border-neutral-800 focus:outline-none transition-colors w-full pb-1 truncate" placeholder="Project Name..." />
            `;
        } else if (state.view === 'templates') {
            container.innerHTML = `
                <div class="bg-purple-600 p-2 rounded-lg text-white"><i class="ph ph-layout text-xl"></i></div>
                <h1 class="text-xl font-bold text-neutral-800 ml-3">Material Template Builder</h1>
            `;
        } else if (state.view === 'suppliers') {
            container.innerHTML = `
                <div class="bg-blue-600 p-2 rounded-lg text-white"><i class="ph ph-database text-xl"></i></div>
                <h1 class="text-xl font-bold text-neutral-800 ml-3">Supplier Extraction Database</h1>
            `;
        }
        
        const syncInd = document.getElementById('sync-indicator');
        if (state.syncStatus === 'syncing') {
            syncInd.innerHTML = `<i class="ph ph-spinner animate-spin text-blue-500 text-base"></i> Cloud Syncing...`;
        } else if (state.syncStatus === 'saved') {
            syncInd.innerHTML = `<i class="ph ph-cloud-check text-green-500 text-base"></i> Saved to Upstash`;
        } else {
            syncInd.innerHTML = `<i class="ph ph-cloud-slash text-neutral-400 text-base"></i> Local Only (Connect)`;

      resetFormData: function(templateId = null) {
        const tId = templateId || (state.templates[0] ? state.templates[0].id : '');
        const template = state.templates.find(t => t.id === tId) || state.templates[0];
        let data = { categoryId: '', areaId: '', templateId: tId, supplier: '', productName: '', specCode: template?.abbreviation ? `${template.abbreviation}-` : '', additionalInfo: '', image: null };
        if(template && template.fields) template.fields.forEach(f => data[f.id] = '');

      },
      handleFormInput: function(name, value) {
        if (name === 'templateId' && !state.editingMaterialId) {
            const oldTmpl = state.templates.find(t => t.id === state.formData.templateId);
            const newTmpl = state.templates.find(t => t.id === value);
            const oldPrefix = oldTmpl?.abbreviation ? `${oldTmpl.abbreviation}-` : '';
            const newPrefix = newTmpl?.abbreviation ? `${newTmpl.abbreviation}-` : '';
            
            let newSpecCode = state.formData.specCode || '';
            if (oldPrefix && newSpecCode.startsWith(oldPrefix)) newSpecCode = newSpecCode.substring(oldPrefix.length);
            else if (newSpecCode.includes('-')) newSpecCode = newSpecCode.substring(newSpecCode.indexOf('-') + 1);
            
            newSpecCode = newPrefix + newSpecCode;
            state.formData.templateId = value;
            state.formData.specCode = newSpecCode;
            this.renderAll(); // Re-render to show new template fields
        } else {
            state.formData[name] = value;
        }
      },
      handleImageUpload: function(input) {
        const file = input.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onloadend = () => {
            state.formData.image = reader.result;
            this.renderAll();
        };
        reader.readAsDataURL(file);

      removeMaterial: function(id) {

            this.resetFormData();
        }
        this.setState(updates);

      // --- DYNAMIC EXTRACTION (MAIN FORM) ---
      triggerExtraction: function() {
        if(!state.pasteHtml || !state.selectedExtractSupplier) return;
        state.isExtracting = true;
        this.renderAll();

        setTimeout(() => {
            try {
                const supplier = state.suppliers.find(s => s.id === state.selectedExtractSupplier);
                const doc = new DOMParser().parseFromString(state.pasteHtml, 'text/html');
                const extracted = {};
                
                for (const [key, mapping] of Object.entries(supplier.mappings)) {
                    if (mapping && mapping.selector && mapping.selector !== 'Manual Pattern Match') {
                        const el = doc.querySelector(mapping.selector);
                        if (el) {
                            extracted[key] = key === 'image' ? (el.src || mapping.text) : (el.textContent || '').replace(/\s+/g, ' ').trim();
                        }
                    }
                }

                let updatedFormData = {
                    ...state.formData,
                    supplier: extracted.supplier || supplier.name,
                    productName: extracted.productName || '',
                    specCode: extracted.productCode || state.formData.specCode,
                    image: extracted.image || '',
                    additionalInfo: `Data securely extracted from HTML code using the '${supplier.name}' template.`
                };

                // Merge dynamic template fields mapped during training
                for (const key in extracted) {
                    if (!['supplier', 'productName', 'productCode', 'image'].includes(key)) {
                        updatedFormData[key] = extracted[key];
                    }
                }

                state.formData = updatedFormData;
                this.toast('Data extracted successfully!', 'success');
            } catch(e) {
                state.formData.additionalInfo = "Failed to parse pasted HTML code.";
                this.toast('Failed to parse pasted HTML code.', 'error');
            }
            state.isExtracting = false;
            state.pasteHtml = '';
            this.renderAll();
        }, 500);
      },

      Trainer: {
        toggleActiveField: function(key) {
            if (state.activeMappingField === key) {
                App.setState({ activeMappingField: null }, true);
            } else {
                App.setState({ activeMappingField: key }, true);
                const currentFields = App.getDynamicMappingFields();
                const fieldLabel = currentFields.find(f=>f.key===key)?.label || key;
                App.toast(`Select text to map to "${fieldLabel}"`, 'info');
            }
            App.renderAll(); 
        },
        clearMapping: function(key) {
            if (state.localMappings[key]) {
                delete state.localMappings[key];
                App.renderAll();
                App.toast('Mapping cleared.', 'info');
            }
        },
        loadUrl: async function() {
            if(!state.simulatedUrl) return;
            App.setState({ isLoadingPage: true, pageLoaded: false, isManualInput: false, extractedText: '', manualHtml: '' });
            try {
                const response = await fetch(`https://corsproxy.io/?${encodeURIComponent(state.simulatedUrl)}`);
                if (!response.ok) throw new Error('Network response was not ok');
                const htmlText = await response.text();
                if (htmlText) App.Trainer.processHtml(htmlText);
                else throw new Error('No contents returned');
            } catch (err) {
                App.setState({ isManualInput: true, isLoadingPage: false });
                App.toast('Could not fetch automatically. Please paste HTML.', 'info');
            }
        },
        processHtml: function(htmlString) {
            const doc = new DOMParser().parseFromString(htmlString, 'text/html');
            parsedDoc = doc.cloneNode(true); // Save real DOM
            
            doc.querySelectorAll('img').forEach(img => {
                if (img.src && img.src.startsWith('http')) {
                    const textNode = doc.createTextNode(`\n[Image URL: ${img.src}]\n`);
                    img.parentNode.replaceChild(textNode, img);
                }
            });
            doc.querySelectorAll('script, style, noscript, iframe, svg, nav, footer, header').forEach(el => el.remove());
            
            let text = doc.body.innerText || doc.body.textContent;
            text = text.replace(/\n\s*\n/g, '\n\n').trim();
            
            if(text) {
                App.setState({ extractedText: text, pageLoaded: true, isLoadingPage: false, isManualInput: false });
            } else { 
                App.toast("No readable text found.", "error"); 
                App.setState({ isLoadingPage: false }); 
            }
        },
        handleSelection: function() {
            // Use timeout to ensure browser selection object has fully updated
            setTimeout(() => {
                const container = document.getElementById('extracted-text-container');
                if(!container) return;
                const selection = window.getSelection();
                const text = selection.toString().trim();
                
                if (text && text.length > 0 && container.contains(selection.anchorNode)) {
                    if (state.activeMappingField) {
                        state.highlightMenu = { visible: false, text: text, x: 0, y: 0 };
                        App.Trainer.mapField(state.activeMappingField);
                        App.setState({ activeMappingField: null }, true);
                        return;
                    }

                    const rangeRect = selection.getRangeAt(0).getBoundingClientRect();
                    
                    // Initial height pos, exact horizontal centering occurs dynamically after render
                    let calcY = rangeRect.top - 60;
                    if (calcY < 10) calcY = rangeRect.bottom + 10;

                    state.highlightMenu = {
                        visible: true, text: text, x: rangeRect.left, y: calcY
                    };
                    App.renderHighlightMenu();
                } else {
                    App.Trainer.closeMenu();
                }
            }, 10);
        },
        getCssSelector: function(el) {
            if (!(el instanceof Element)) return '';
            let path = [];
            while (el.nodeType === Node.ELEMENT_NODE) {
                let selector = el.nodeName.toLowerCase();
                if (el.id) {
                    selector += '#' + el.id;
                    path.unshift(selector);
                    break;
                } else {
                    let sib = el, nth = 1;
                    while (sib = sib.previousElementSibling) {
                        if (sib.nodeName.toLowerCase() == selector) nth++;
                    }
                    if (nth != 1) selector += ":nth-of-type(" + nth + ")";
                }
                path.unshift(selector);
                el = el.parentNode;
            }
            return path.join(" > ");
        },
        mapField: function(fieldKey) {
            const text = state.highlightMenu.text;
            let selectorLoc = '';

            if (parsedDoc) {
                if (fieldKey === 'image' && text.includes('http')) {
                    const exSrc = text.replace('[Image URL: ', '').replace(']', '').trim();
                    const imgEl = Array.from(parsedDoc.body.getElementsByTagName('img')).find(img => img.src === exSrc || img.src === text);
                    if (imgEl) selectorLoc = App.Trainer.getCssSelector(imgEl);
                } else {
                    const cleanTextStr = text.replace(/\s+/g, ' ').trim();
                    const elements = Array.from(parsedDoc.body.getElementsByTagName('*'))
                        .filter(el => !['script', 'style', 'noscript', 'svg', 'iframe'].includes(el.tagName.toLowerCase()));
                    const match = elements.reverse().find(el => {
                        const elText = (el.textContent || '').replace(/\s+/g, ' ').trim();
                        return elText.includes(cleanTextStr);
                    });
                    if (match) selectorLoc = App.Trainer.getCssSelector(match);
                }
            }

            if (!selectorLoc) selectorLoc = 'Manual Pattern Match';
            state.localMappings[fieldKey] = { text, selector: selectorLoc };
            App.Trainer.closeMenu();
            window.getSelection().removeAllRanges();
            App.renderAll(); // Re-render to show updated locations and text highlights
        },
        closeMenu: function() {
            state.highlightMenu = { visible: false, x:0, y:0, text:'' };
            App.renderHighlightMenu();
        },
        saveTemplate: function() {
            const sups = state.suppliers.map(s => s.id === state.activeSupplierId ? { ...s, mappings: state.localMappings } : s);
            App.setState({ suppliers: sups });
            App.toast("Extraction Location Template Saved!", "success");
        }
      },

      setupHighlightMenu: function() {
          // Document level clicks close the menu if clicking outside
          document.addEventListener('mousedown', (e) => {
              const menu = document.getElementById('highlight-menu');
              // Safe check for the visible property
              if(state.highlightMenu?.visible && menu && !menu.contains(e.target)) {
                  App.Trainer.closeMenu();
              }
          });
      },

      renderHighlightMenu: function() {
        const menu = document.getElementById('highlight-menu');
        if(state.highlightMenu.visible) {
            menu.style.top = `${state.highlightMenu.y}px`;
            
            const currentFields = App.getDynamicMappingFields();
            let btns = currentFields.map((f, i) => {
                const cClass = App.getHighlightColor(f.key, i);
                return `<button onmousedown="event.preventDefault(); App.Trainer.mapField('${f.key}')" class="px-2.5 py-1.5 text-[11px] font-bold rounded shadow-sm transition-transform hover:scale-105 whitespace-nowrap cursor-pointer border ${cClass}">${f.label}</button>`;
            }).join('');
            
            menu.innerHTML = `<span class="text-[11px] font-medium text-neutral-400 px-2 py-1.5 border-r border-neutral-700 shrink-0">Map to:</span>${btns}<button onclick="App.Trainer.closeMenu()" class="ml-auto px-2 py-1.5 text-neutral-400 hover:text-white">✕</button>`;
            menu.classList.remove('hidden');
            menu.classList.add('flex');

            // Perfectly center menu horizontally over the selection now that accurate width is known
            const menuRect = menu.getBoundingClientRect();
            const selection = window.getSelection();
            if(selection.rangeCount > 0) {
                const rangeRect = selection.getRangeAt(0).getBoundingClientRect();
                let adjustedX = rangeRect.left + (rangeRect.width / 2) - (menuRect.width / 2);
                adjustedX = Math.max(10, Math.min(adjustedX, window.innerWidth - menuRect.width - 10));
                menu.style.left = `${adjustedX}px`;
            }
        } else {
            menu.classList.add('hidden');
            menu.classList.remove('flex');
        }
      },

      // --- CLOUD STORAGE (UPSTASH KV) ---
      Cloud: {
        lastCloudUpdate: 0,
        pollingInterval: null,

        init: async function() {
            if (!KV_REST_API_URL || !KV_REST_API_TOKEN) {
                console.warn("Upstash KV credentials missing. Running local mode.");
                state.syncStatus = 'offline';
                this.loadLocal();
                return;
            }
            await this.fetch();
            this.startPolling();
        },
        
        startPolling: function() {
            if (this.pollingInterval) clearInterval(this.pollingInterval);
            this.pollingInterval = setInterval(() => {
                // Do not fetch if we are currently saving to avoid race conditions
                if (state.syncStatus !== 'syncing') {
                    this.fetch(true); // silent fetch
                }
            }, 5000); // Check for updates every 5 seconds
        },

        loadLocal: function() {
            const local = localStorage.getItem(LOCAL_STORAGE_KEY);
            if (local) {
                const data = JSON.parse(local);
                if(data.projects) state.projects = data.projects;
                if(data.templates) state.templates = data.templates;
                if(data.suppliers) state.suppliers = data.suppliers;
            }
        },

        fetch: async function(silent = false) {
            if (!KV_REST_API_URL || !KV_REST_API_TOKEN) return this.loadLocal();
            
            try {
                const res = await fetch(`${KV_REST_API_URL}/get/${KV_KEY}`, {
                    headers: { Authorization: `Bearer ${KV_REST_API_TOKEN}` }
                });
                if(!res.ok) throw new Error("KV fetch failed");
                const json = await res.json();
                
                if(json.result) {
                    const data = JSON.parse(json.result);
                    
                    // Only apply if the cloud has a newer timestamp than our local tracking
                    if (data.updatedAt && data.updatedAt > this.lastCloudUpdate) {
                        this.lastCloudUpdate = data.updatedAt;
                        
                        if(data.projects) state.projects = data.projects;
                        if(data.templates) state.templates = data.templates;
                        if(data.suppliers) state.suppliers = data.suppliers;

                        // Backup fetched cloud data locally just in case
                        localStorage.setItem(LOCAL_STORAGE_KEY, json.result);

                        // If user is not currently editing, safely refresh UI
                        if (!state.editingMaterialId && !state.isExtracting && !state.isManualInput) {
                            App.renderAll();
                            if (silent) App.toast("Live sync updated from cloud.", "info");
                        } else if (silent) {
                            App.toast("Background updates received. Will apply after editing.", "info");
                        }
                    }
                }
                state.syncStatus = 'saved';
                if(!silent) App.renderHeader();
            } catch(e) {
                console.error(e);
                state.syncStatus = 'offline';
                if(!silent) this.loadLocal();
            }
        },

        save: function() {
            const payloadObj = {
                projects: state.projects.map(p => ({
                    ...p,
                    materials: p.materials.map(m => {
                        if (m.image && m.image.startsWith('data:')) {
                            return { ...m, image: null, additionalInfo: (m.additionalInfo ? m.additionalInfo + '\n\n' : '') + '[Image removed for cloud limits]' };
                        }
                        return m;
                    })
                })),
                templates: state.templates,
                suppliers: state.suppliers,
                updatedAt: Date.now()
            };
            
            const payload = JSON.stringify(payloadObj);
            
            // Backup locally instantly
            localStorage.setItem(LOCAL_STORAGE_KEY, payload);
            this.lastCloudUpdate = payloadObj.updatedAt; // Update our own tracking to avoid re-fetching our own save

            if (!KV_REST_API_URL || !KV_REST_API_TOKEN) return;
            state.syncStatus = 'syncing';
            App.renderHeader(); // update indicator

            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(async () => {
                try {
                    const res = await fetch(`${KV_REST_API_URL}/set/${KV_KEY}`, {
                        method: 'POST',
                        headers: { Authorization: `Bearer ${KV_REST_API_TOKEN}`, 'Content-Type': 'application/json' },
                        body: payload
                    });
                    if(!res.ok) throw new Error("KV save failed");
                    state.syncStatus = 'saved';
                    App.renderHeader();
                } catch(e) {
                    console.error(e);
                    state.syncStatus = 'offline';
                    App.renderHeader();
                }
            }, 1000); // 1 second debounce for snappy multi-user sync
        }
      },

        Templates: function() {

            return `
            <div class="w-full lg:w-1/2 space-y-6">
              <div class="bg-white p-6 rounded-xl shadow-sm border border-neutral-200">

                        <input type="text" value="${f.label}" oninput="App.updateTemplateField('${f.id}', this.value)" class="flex-1 px-3 py-1.5 bg-white border border-neutral-300 rounded text-sm font-medium focus:outline-none focus:border-purple-400" />

              <div class="bg-neutral-50 p-6 rounded-xl border border-neutral-200 sticky top-6">

                    <div class="col-span-1"><label class="block text-xs font-medium text-neutral-500 mb-1">Spec Code *</label><div class="w-full px-3 py-2 border border-neutral-200 rounded-md bg-neutral-50 text-sm text-neutral-400">Static Field</div></div>

                    <div class="col-span-2 border-t border-dashed border-neutral-200 my-2"></div>

                    `).join('')}

            `;
        },

        Suppliers: function() {
            const aSup = state.suppliers.find(s => s.id === state.activeSupplierId) || state.suppliers[0];
            const currentFields = App.getDynamicMappingFields();
            
            // Build highlighted text string
            let highText = state.extractedText;
            if (highText) {
                const activeMap = Object.entries(state.localMappings).filter(([_, m]) => m && m.text && m.text.trim().length > 0).map(([k, m]) => [k, m.text]).sort((a,b) => b[1].length - a[1].length);
                if (activeMap.length > 0) {
                    const escReg = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    const searchReg = new RegExp(activeMap.map(([_, v]) => escReg(v)).join('|'), 'g');
                    let res = [], last = 0, match;
                    while((match = searchReg.exec(state.extractedText)) !== null) {
                        if(match.index > last) res.push(state.extractedText.substring(last, match.index));
                        const mStr = match[0];
                        const mKey = activeMap.find(([_,v]) => v === mStr)[0];
                        
                        const fIndex = currentFields.findIndex(f => f.key === mKey);
                        const cClass = fIndex !== -1 ? App.getHighlightColor(mKey, fIndex) : 'bg-neutral-200 text-neutral-800 border-neutral-300';
                        
                        res.push(`<span class="px-1.5 py-0.5 mx-0.5 rounded shadow-sm border ${cClass} font-medium">${mStr}</span>`);
                        last = searchReg.lastIndex;
                    }
                    if(last < state.extractedText.length) res.push(state.extractedText.substring(last));
                    highText = res.join('');
                }
            }

            return `
            <div class="w-full lg:w-1/3 space-y-6">
              <div class="bg-white p-6 rounded-xl shadow-sm border border-neutral-200">
                <div class="flex justify-between items-center mb-6 border-b pb-3 border-neutral-100">

                  </div>
                  <div>
                    <label class="block text-xs font-medium text-neutral-500 mb-1">Domain (e.g. porcelanosa.com)</label>
                    <input type="text" value="${aSup.domain}" oninput="App.updateSupplierProp('domain', this.value)" class="w-full px-3 py-2 border border-neutral-300 rounded-md text-sm font-mono text-blue-600" />
                  </div>
                </div>
              </div>
              <div class="bg-white p-6 rounded-xl shadow-sm border border-neutral-200">
                 <div class="flex items-center justify-between mb-4">
                     <div>
                         <h2 class="text-lg font-semibold text-neutral-800">Extraction Locations</h2>
                         <p class="text-xs text-neutral-500 mt-1">Highlight text in the preview on the right to teach the system where to look for data.</p>
                     </div>
                 </div>
                 
                 <div class="mb-5 bg-purple-50/50 p-3 rounded-lg border border-purple-100">
                   <label class="block text-xs font-bold text-purple-600 mb-1.5 flex items-center gap-1"><i class="ph ph-layout"></i> Target Template Properties</label>
                   <select onchange="App.setState({trainerTemplateId: this.value})" class="w-full px-3 py-2 border border-purple-200 rounded-md focus:ring-2 focus:ring-purple-500 text-sm bg-white text-purple-900 font-medium cursor-pointer shadow-sm">
                       ${state.templates.map(t => `<option value="${t.id}" ${state.trainerTemplateId === t.id ? 'selected' : ''}>${t.name}</option>`).join('')}
                   </select>
                 </div>

                 <div class="space-y-3">
                   ${currentFields.map((f, i) => {
                       const mData = state.localMappings[f.key];
                       const cClass = App.getHighlightColor(f.key, i);
                       return `
                       <div class="flex flex-col border-b border-neutral-100 pb-2">
                         <span class="text-xs font-semibold text-neutral-400 uppercase tracking-wider">${f.label}</span>
                         <div class="flex items-center gap-2 mt-1">
                           ${mData && mData.text ? `
                               <div class="text-xs font-medium px-2 py-1.5 rounded border flex flex-col gap-0.5 overflow-hidden w-full ${cClass}">
                                 <div class="flex items-center justify-between">
                                     <div class="flex items-center gap-1 font-bold"><i class="ph ph-check"></i> Location Rule Saved</div>
                                     <button onclick="App.Trainer.clearMapping('${f.key}')" class="text-neutral-500 hover:text-red-600 transition-colors" title="Clear Mapping"><i class="ph ph-x"></i></button>
                                 </div>
                                 <span class="font-mono text-[10px] opacity-80 truncate" title="${mData.selector}">Selector: ${mData.selector}</span>
                                 <span class="truncate italic opacity-75 mt-0.5">Sample: "${mData.text}"</span>
                               </div>
                           ` : `<span class="text-sm italic text-neutral-400">Unmapped (Select legend to map)</span>`}
                         </div>
                       </div>
                       `;
                   }).join('')}
                 </div>
                 <button onclick="App.Trainer.saveTemplate()" class="w-full mt-6 bg-neutral-900 text-white py-2.5 rounded-md font-medium hover:bg-neutral-800 flex items-center justify-center gap-2"><i class="ph ph-floppy-disk text-lg"></i> Save Template Locations</button>
              </div>
            </div>

            <!-- Trainer Side -->
            <div class="w-full lg:w-2/3 bg-white p-6 rounded-xl shadow-sm border border-neutral-200 flex flex-col">
              <h2 class="text-lg font-semibold mb-4 flex items-center gap-2 border-b border-neutral-100 pb-3 text-neutral-800">
                <i class="ph ph-cursor-click text-xl text-blue-500"></i> Interactive Extraction Trainer
              </h2>
              <div class="flex gap-2 mb-4">
                <input type="url" value="${state.simulatedUrl}" oninput="App.setState({simulatedUrl: this.value}, true)" placeholder="https://..." class="flex-1 px-3 py-2 border border-neutral-300 rounded-md text-sm bg-neutral-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500" />
                <button onclick="App.Trainer.loadUrl()" ${state.isLoadingPage||!state.simulatedUrl?'disabled':''} class="bg-neutral-200 hover:bg-neutral-300 disabled:opacity-50 px-4 py-2 rounded-md text-sm font-medium flex items-center gap-2">
                  ${state.isLoadingPage ? '<i class="ph ph-spinner animate-spin"></i> Fetching...' : '<i class="ph ph-download-simple"></i> Test URL Fetch'}
                </button>
                <button onclick="App.setState({isManualInput: true})" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md text-sm font-medium flex items-center gap-2">
                  <i class="ph ph-code"></i> Paste HTML
                </button>
              </div>

              <div class="flex-1 bg-neutral-50 rounded-lg border border-neutral-200 relative overflow-hidden flex flex-col">
                ${state.isLoadingPage ? `
                  <div class="flex flex-col items-center justify-center h-full text-neutral-400">
                    <i class="ph ph-spinner animate-spin text-4xl text-blue-500 mb-4"></i>
                    <p>Attempting to fetch URL data...</p>
                  </div>
                ` : state.isManualInput ? `
                  <div class="flex flex-col h-full p-6">
                    <div class="mb-4 text-sm text-blue-800 font-medium bg-blue-50 p-3 rounded-md border border-blue-200 flex items-start gap-2">
                      <i class="ph ph-code text-xl shrink-0 mt-0.5"></i>
                      <div><p class="font-bold mb-1">HTML Manual Override</p><p>Go to the product page, press <strong>Ctrl+U</strong>, copy all code, and paste it below.</p></div>
                    </div>
                    <textarea oninput="App.setState({manualHtml: this.value}, true); document.getElementById('parse-html-btn').disabled = !this.value.trim();" placeholder="<html>... paste raw HTML here ...</html>" class="flex-1 w-full p-4 border border-neutral-300 rounded-md resize-none focus:ring-2 focus:ring-blue-500 text-xs font-mono">${state.manualHtml}</textarea>
                    <button id="parse-html-btn" onclick="App.Trainer.processHtml(state.manualHtml);" ${!state.manualHtml.trim()?'disabled':''} class="mt-4 bg-blue-600 disabled:bg-neutral-400 disabled:cursor-not-allowed text-white px-4 py-2.5 rounded-md font-medium transition-colors">Parse HTML & Start Highlighting</button>
                  </div>
                ` : state.pageLoaded ? `
                  <div class="px-6 pt-4 pb-3 border-b border-neutral-200 flex flex-col sm:flex-row gap-3 items-start sm:items-center justify-between shrink-0 bg-white shadow-sm z-10 relative">
                    <div class="flex items-center gap-2 flex-wrap flex-1">
                      <span class="text-[10px] font-bold text-neutral-500 uppercase mr-1"><i class="ph ph-palette"></i> Learning Color Legend:</span>
                      ${currentFields.map((f, i) => {
                          const mData = state.localMappings[f.key];
                          const cClass = App.getHighlightColor(f.key, i);
                          const isMapped = mData && mData.text;
                          const isActive = state.activeMappingField === f.key;
                          const activeClass = isActive ? 'ring-2 ring-offset-2 ring-blue-500 scale-105 shadow-md z-10' : '';
                          return `<button onclick="App.Trainer.toggleActiveField('${f.key}')" class="text-[10px] font-bold px-2 py-0.5 rounded border ${cClass} transition-all cursor-pointer hover:scale-105 hover:opacity-100 ${isMapped && !isActive ? 'opacity-100 shadow-sm' : (!isActive ? 'opacity-40 border-dashed' : '')} ${activeClass}">${f.label}</button>`;
                      }).join('')}
                    </div>
                    <div class="shrink-0 flex items-center gap-2 sm:border-l sm:border-neutral-200 sm:pl-3">
                       <span class="text-[10px] font-bold text-neutral-500 uppercase hidden lg:block">Template:</span>
                       <select onchange="App.setState({trainerTemplateId: this.value})" class="text-xs border border-neutral-300 rounded px-2 py-1.5 bg-neutral-50 text-neutral-700 outline-none focus:ring-1 focus:ring-purple-500 cursor-pointer font-medium">
                          ${state.templates.map(t => `<option value="${t.id}" ${state.trainerTemplateId === t.id ? 'selected' : ''}>${t.name}</option>`).join('')}
                       </select>
                    </div>
                  </div>
                  <div id="extracted-text-container" class="p-6 text-neutral-800 whitespace-pre-wrap leading-relaxed text-sm md:text-base font-serif overflow-y-auto h-full relative cursor-text select-text bg-white">
                    ${highText}
                  </div>
                ` : `
                  <div class="flex flex-col items-center justify-center h-full text-neutral-400 p-6 text-center">
                    <i class="ph ph-code text-5xl opacity-50 mb-4"></i>
                    <p>Click "Paste HTML" to train the system using the website's source code.</p>
                  </div>
                `}
              </div>
            </div>
            `;
        }
      }
    };

    // Run Initialization
    document.addEventListener("DOMContentLoaded", () => App.init());
  </script>
</body>
</html>
